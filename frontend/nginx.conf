server {
    listen 80;
    server_name localhost;

    location /freashday {
        alias /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /freashday/index.html;
    }

    location / {
        return 301 /freashday/;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
