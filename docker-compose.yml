services:
  postgres:
    image: postgres:16-alpine
    container_name: freashday-db
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-freashday}
      POSTGRES_USER: ${POSTGRES_USER:-freashday_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-freashday_secret_2026}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-freashday_user} -d ${POSTGRES_DB:-freashday}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: freashday-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-freashday_user}:${POSTGRES_PASSWORD:-freashday_secret_2026}@postgres:5432/${POSTGRES_DB:-freashday}
      JWT_SECRET: ${JWT_SECRET:-freashday-jwt-super-secret-change-in-production}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-7d}
      NODE_ENV: ${NODE_ENV:-production}
      API_PORT: 3000
    ports:
      - "3000:3000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: freashday-web
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  postgres_data:
    driver: local
